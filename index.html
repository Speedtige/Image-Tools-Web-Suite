Funciones principales:

✔ Redimensionar imágenes manteniendo proporción
✔ Convertir formatos (PNG, JPG, WEBP)
✔ Control de calidad de compresión
✔ Vista previa interactiva
✔ Mezcla de imágenes (foreground / background)
✔ Arrastre de imagen frontal dentro del canvas
✔ Descarga directa de resultados

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor y Redimensionador de Imágenes</title>
    <link rel="icon" type="favicon.ico" href="favicon.ico">
    
    <style>

		/* --- Variables y Estilos Base --- */
		:root {
		    --primary-color: #007BFF;
		    --secondary-color: #6c757d;
		    --background-color: #f4f7f6;
		    --container-bg: #ffffff;
		    --text-color: #333;
		    --border-color: #ddd;
		    --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
		    --border-radius: 8px;
		}

		* {
		    box-sizing: border-box;
		    margin: 0;
		    padding: 0;
		}

		body {
		    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
		    background-color: var(--background-color);
		    color: var(--text-color);
		    line-height: 1.6;
		}

		.container {
		    max-width: 900px;
		    margin: 2rem auto;
		    padding: 2rem;
		    background-color: var(--container-bg);
		    border-radius: var(--border-radius);
		    box-shadow: var(--shadow);
		}

		header {
		    text-align: center;
		    margin-bottom: 2rem;
		    border-bottom: 1px solid var(--border-color);
		    padding-bottom: 1rem;
		}

		header h1 {
		    color: var(--primary-color);
		    margin-bottom: 0.5rem;
		}

		/* --- Sección de Carga --- */
		.upload-section {
		    margin-bottom: 2rem;
		}

		.drop-zone {
		    border: 2px dashed var(--primary-color);
		    border-radius: var(--border-radius);
		    padding: 3rem 2rem;
		    text-align: center;
		    cursor: pointer;
		    transition: background-color 0.3s, border-color 0.3s;
		}

		.drop-zone:hover,
		.drop-zone.drag-over {
		    background-color: #e9f5ff;
		    border-color: #0056b3;
		}

		/* --- Sección de Controles y Vista Previa --- */
		.controls-section {
		    display: grid;
		    grid-template-columns: 1fr 1fr;
		    gap: 2rem;
		    opacity: 0;
		    transform: translateY(20px);
		    transition: opacity 0.5s ease-out, transform 0.5s ease-out;
		}

		.controls-section.visible {
		    opacity: 1;
		    transform: translateY(0);
		}

		.preview-container, .options-container {
		    background-color: #fafafa;
		    padding: 1.5rem;
		    border-radius: var(--border-radius);
		    border: 1px solid var(--border-color);
		}

		.preview-container h3, .options-container h3 {
		    margin-bottom: 1rem;
		    color: var(--secondary-color);
		}

		#image-canvas {
		    max-width: 100%;
		    height: auto;
		    border: 1px solid var(--border-color);
		    background-color: #fff;
		    display: block; /* Evita espacio extra debajo */
		    cursor: pointer; /* NUEVO: Indica que es clickeable */
		}

		#original-dimensions {
		    margin-top: 0.5rem;
		    font-size: 0.9em;
		    color: var(--secondary-color);
		}

		/* --- Formularios y Controles --- */
		.input-group, .select-group, .checkbox-group {
		    margin-bottom: 1rem;
		}

		.input-group label, .select-group label {
		    display: block;
		    margin-bottom: 0.5rem;
		    font-weight: bold;
		}

		.input-group input, .select-group select {
		    width: 100%;
		    padding: 0.75rem;
		    border: 1px solid var(--border-color);
		    border-radius: 4px;
		    font-size: 1rem;
		}

		.checkbox-group {
		    display: flex;
		    align-items: center;
		}

		.checkbox-group input {
		    margin-right: 0.5rem;
		}

		.quality-group {
		    transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
		    overflow: hidden;
		    max-height: 0;
		    opacity: 0;
		}

		.quality-group.visible {
		    max-height: 100px; /* Ajustar según sea necesario */
		    opacity: 1;
		}

		/* --- Botón de Descarga --- */
		.download-btn {
		    display: block;
		    width: 100%;
		    padding: 1rem;
		    background-color: var(--primary-color);
		    color: white;
		    border: none;
		    border-radius: var(--border-radius);
		    font-size: 1.1rem;
		    font-weight: bold;
		    cursor: pointer;
		    transition: background-color 0.3s;
		}

		.download-btn:hover {
		    background-color: #0056b3;
		}

		/* --- Clase Utilitarias --- */
		.hidden {
		    display: none;
		}

		/* --- Estilos del Modal --- */
		.modal {
		    display: none; /* Oculto por defecto */
		    position: fixed;
		    z-index: 1000;
		    left: 0;
		    top: 0;
		    width: 100%;
		    height: 100%;
		    overflow: auto;
		    background-color: rgba(0, 0, 0, 0.85);
		    animation: fadeIn 0.3s;
		}

		@keyframes fadeIn {
		    from { opacity: 0; }
		    to { opacity: 1; }
		}

		.modal-content-wrapper {
		    position: relative;
		    width: 100%;
		    height: 100%;
		    display: flex;
		    justify-content: center;
		    align-items: center;
		    padding: 1rem;
		}

		.modal-content {
		    max-width: 100%;
		    max-height: 100%;
		    object-fit: contain; /* Mantiene la relación de aspecto sin recortar */
		    transform-origin: center center;
		    transition: transform 0.2s ease-out;
		    cursor: grab;
		    user-select: none;
		    -webkit-user-drag: none;
		    -khtml-user-drag: none;
		    -moz-user-drag: none;
		    -o-user-drag: none;
		}

		.modal-content.dragging {
		    cursor: grabbing;
		}

		.modal-close {
		    position: absolute;
		    top: 20px;
		    right: 35px;
		    color: #f1f1f1;
		    font-size: 40px;
		    font-weight: bold;
		    z-index: 1001;
		    cursor: pointer;
		    transition: 0.3s;
		}

		.modal-close:hover,
		.modal-close:focus {
		    color: #bbb;
		    text-decoration: none;
		}

		/* --- Diseño Responsive (Tablets y Móviles) --- */
		@media (max-width: 768px) {
		    .container {
		        margin: 1rem;
		        padding: 1rem;
		    }

		    .controls-section {
		        grid-template-columns: 1fr;
		    }
		    
		    .modal-close {
		        font-size: 30px;
		        top: 15px;
		        right: 20px;
		    }
		}

		.tabs{
		    display:flex;
		    gap:10px;
		    margin-bottom:20px;
		    justify-content: center;
		}

		.tab-btn{
		    padding:10px 20px;
		    border:none;
		    background:#ddd;
		    cursor:pointer;
		    border-radius:5px;
		}

		.tab-btn.active{
		    background:#007BFF;
		    color:white;
		}

		.tab-content{
		    display:none;
		}

		.tab-content.active{
		    display:block;
		}

		#merge-canvas{
		    max-width:100%;
		    border:1px solid #ccc;
		    margin-top:10px;
		    cursor:move;
		}

	</style>

</head>
<body>

    <div class="container">
        <header>
            <h1>Convertidor y Redimensionador de Imágenes</h1>
            <p>Sube una imagen, ajusta su tamaño y descárgala en el formato que prefieras.</p>
        </header>

        <main class="main-content">

        	<div class="tabs">
			    <button class="tab-btn active" data-tab="tab1">Redimensionar</button>
			    <button class="tab-btn" data-tab="tab2">Mezclar imágenes</button>
			</div>

            <!-- Área de carga de imagen -->
            <div id="tab1" class="tab-content active">
            	<section class="upload-section">
	                <div id="drop-zone" class="drop-zone">
	                    <p>Arrastra y suelta una imagen aquí o haz clic para seleccionar</p>
	                    <input type="file" id="file-input" accept="image/*" hidden>
	                </div>
	            </section>
            </div>

            <div id="tab2" class="tab-content">

				<section class="upload-section">

					<h3>Mezclar Imágenes</h3>

					<div class="input-group">
						<label>Imagen Fondo</label>
						<input type="file" id="bg-image-input" accept="image/*">
					</div>

					<div class="input-group">
						<label>Imagen Frontal</label>
						<input type="file" id="fg-image-input" accept="image/*">
					</div>

					<canvas id="merge-canvas"></canvas>

					<button id="download-merge" class="download-btn">
						Descargar Imagen Mezclada
					</button>

				</section>

			</div>

            <!-- Área de vista previa y controles -->
            <section id="controls-section" class="controls-section hidden">
                <div class="preview-container">
                    <h3>Vista Previa</h3>
                    <!-- Canvas clickeable para abrir el modal -->
                    <canvas id="image-canvas" class="modal-trigger"></canvas>
                    <p id="original-dimensions"></p>
                </div>
                
                <div class="options-container">
                    <h3>Opciones de Redimensionamiento</h3>
                    
                    <!-- Dimensiones -->
                    <div class="input-group">
                        <label for="width-input">Ancho (px):</label>
                        <input type="number" id="width-input" min="1" placeholder="Ancho">
                    </div>
                    <div class="input-group">
                        <label for="height-input">Alto (px):</label>
                        <input type="number" id="height-input" min="1" placeholder="Alto">
                    </div>
                    
                    <!-- Mantener Aspect Ratio -->
                    <div class="checkbox-group">
                        <input type="checkbox" id="aspect-ratio-checkbox" checked>
                        <label for="aspect-ratio-checkbox">Mantener relación de aspecto</label>
                    </div>

                    <!-- Formato de Salida -->
                    <div class="select-group">
                        <label for="format-select">Formato de Salida:</label>
                        <select id="format-select">
                            <option value="image/png">PNG</option>
                            <option value="image/jpeg">JPEG</option>
                            <option value="image/webp">WebP</option>
                        </select>
                    </div>

                    <!-- Calidad (para JPEG/WebP) -->
                    <div class="input-group quality-group hidden">
                        <label for="quality-input">Calidad (0.1 - 1.0):</label>
                        <input type="number" id="quality-input" min="0.1" max="1" step="0.1" value="0.9">
                    </div>

                    <!-- Botón de Descarga -->
                    <button id="download-btn" class="download-btn">Descargar Imagen</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Estructura del Modal -->
    <div id="image-modal" class="modal">
        <span class="modal-close">&times;</span>
        <div class="modal-content-wrapper">
            <img class="modal-content" id="modal-image" src="" alt="Vista previa de la imagen a tamaño completo">
        </div>
    </div>

    <script>

		document.addEventListener('DOMContentLoaded', () => {
			// SISTEMA DE TABS
			const tabButtons = document.querySelectorAll(".tab-btn");
			const tabContents = document.querySelectorAll(".tab-content");

			tabButtons.forEach(btn=>{
			    btn.addEventListener("click",()=>{

			        tabButtons.forEach(b=>b.classList.remove("active"));
			        tabContents.forEach(c=>c.classList.remove("active"));

			        btn.classList.add("active");

			        const tab = document.getElementById(btn.dataset.tab);
			        tab.classList.add("active");

			    });
			});

		    // --- Elementos del DOM ---
		    const dropZone = document.getElementById('drop-zone');
		    const fileInput = document.getElementById('file-input');
		    const controlsSection = document.getElementById('controls-section');
		    const canvas = document.getElementById('image-canvas');
		    const ctx = canvas.getContext('2d');
		    const widthInput = document.getElementById('width-input');
		    const heightInput = document.getElementById('height-input');
		    const aspectRatioCheckbox = document.getElementById('aspect-ratio-checkbox');
		    const formatSelect = document.getElementById('format-select');
		    const qualityInput = document.getElementById('quality-input');
		    const qualityGroup = document.querySelector('.quality-group');
		    const downloadBtn = document.getElementById('download-btn');
		    const originalDimensionsP = document.getElementById('original-dimensions');

		    // --- Elementos del Modal ---
		    const modal = document.getElementById('image-modal');
		    const modalImage = document.getElementById('modal-image');
		    const modalCloseBtn = document.querySelector('.modal-close');

		    // --- Estado de la Aplicación ---
		    let originalImage = null;
		    let aspectRatio = 1;
		    let currentImageSrc = '';

		    // --- Event Listeners ---
		    // Carga de archivo (clic o arrastrar)
		    dropZone.addEventListener('click', () => fileInput.click());
		    fileInput.addEventListener('change', handleFileSelect);
		    dropZone.addEventListener('dragover', handleDragOver);
		    dropZone.addEventListener('dragleave', handleDragLeave);
		    dropZone.addEventListener('drop', handleFileDrop);

		    // Controles de redimensionamiento
		    widthInput.addEventListener('input', handleDimensionChange);
		    heightInput.addEventListener('input', handleDimensionChange);
		    aspectRatioCheckbox.addEventListener('change', handleDimensionChange);

		    // Control de formato y calidad
		    formatSelect.addEventListener('change', handleFormatChange);

		    // Botón de descarga
		    downloadBtn.addEventListener('click', handleDownload);

		    // --- Event Listeners del Modal ---
		    canvas.addEventListener('click', openModal);
		    modalCloseBtn.addEventListener('click', closeModal);
		    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
		    document.addEventListener('keydown', (e) => { if (e.key === "Escape") closeModal(); });

		    // --- Lógica de Zoom Táctil ---
		    let touchStartDistance = 0;
		    let modalImageScale = 1;

		    modalImage.addEventListener('touchstart', (e) => {
		        if (e.touches.length === 2) {
		            e.preventDefault(); // Prevenir el zoom del navegador
		            const dx = e.touches[0].clientX - e.touches[1].clientX;
		            const dy = e.touches[0].clientY - e.touches[1].clientY;
		            touchStartDistance = Math.sqrt(dx * dx + dy * dy);
		        }
		    });

		    modalImage.addEventListener('touchmove', (e) => {
		        if (e.touches.length === 2) {
		            e.preventDefault(); // Prevenir el zoom del navegador
		            const dx = e.touches[0].clientX - e.touches[1].clientX;
		            const dy = e.touches[0].clientY - e.touches[1].clientY;
		            const distance = Math.sqrt(dx * dx + dy * dy);

		            if (touchStartDistance > 0) {
		                const scaleChange = distance / touchStartDistance;
		                modalImageScale = Math.min(Math.max(1, modalImageScale * scaleChange), 5); // Limitar zoom entre 1x y 5x
		                modalImage.style.transform = `scale(${modalImageScale})`;
		                touchStartDistance = distance; // Actualizar para el siguiente movimiento
		            }
		        }
		    });
		    
		    // Resetear el zoom al soltar los dedos
		    modalImage.addEventListener('touchend', () => {
		        touchStartDistance = 0;
		    });

		    // --- Funciones de Manejo de Archivos ---
		    function handleFileSelect(e) {
		        const file = e.target.files[0];
		        if (file && file.type.startsWith('image/')) {
		            processImage(file);
		        }
		    }

		    function handleDragOver(e) {
		        e.preventDefault();
		        dropZone.classList.add('drag-over');
		    }

		    function handleDragLeave(e) {
		        e.preventDefault();
		        dropZone.classList.remove('drag-over');
		    }

		    function handleFileDrop(e) {
		        e.preventDefault();
		        dropZone.classList.remove('drag-over');
		        const file = e.dataTransfer.files[0];
		        if (file && file.type.startsWith('image/')) {
		            processImage(file);
		        }
		    }

		    function processImage(file) {
		        const reader = new FileReader();
		        reader.onload = (e) => {
		            const img = new Image();
		            img.onload = () => {
		                originalImage = img;
		                aspectRatio = img.width / img.height;
		                currentImageSrc = e.target.result; // Guardar la fuente para el modal

		                // Mostrar controles
		                controlsSection.classList.remove('hidden');
		                setTimeout(() => controlsSection.classList.add('visible'), 10);

		                // Inicializar valores
		                widthInput.value = img.width;
		                heightInput.value = img.height;
		                originalDimensionsP.textContent = `Dimensiones originales: ${img.width}px x ${img.height}px`;
		                
		                // Renderizar la imagen en el canvas
		                renderImage();
		            };
		            img.src = e.target.result;
		        };
		        reader.readAsDataURL(file);
		    }

		    // --- Funciones de Redimensionamiento y Renderizado ---
		    function handleDimensionChange() {
		        if (!originalImage) return;

		        if (aspectRatioCheckbox.checked) {
		            const source = event.target.id === 'width-input' ? widthInput : heightInput;
		            const target = event.target.id === 'width-input' ? heightInput : widthInput;
		            
		            if (source.value && !isNaN(source.value)) {
		                if (source === widthInput) {
		                    target.value = Math.round(source.value / aspectRatio);
		                } else {
		                    target.value = Math.round(source.value * aspectRatio);
		                }
		            }
		        }
		        renderImage();
		    }

		    function renderImage() {
		        if (!originalImage) return;

		        const width = parseInt(widthInput.value, 10);
		        const height = parseInt(heightInput.value, 10);

		        if (width > 0 && height > 0) {
		            canvas.width = width;
		            canvas.height = height;
		            ctx.drawImage(originalImage, 0, 0, width, height);
		        }
		    }

			// --- Funciones de Formato y Descarga ---
			function handleFormatChange() {
			    const format = formatSelect.value;

			    if (format === 'image/jpeg' || format === 'image/webp') {
			        qualityGroup.classList.add('visible');
			    } else {
			        qualityGroup.classList.remove('visible');
			    }
			}

			function handleDownload() {
			    if (!originalImage || !canvas.width || !canvas.height) {
			        alert('Por favor, carga una imagen y define un tamaño válido antes de descargar.');
			        return;
			    }

			    const format = formatSelect.value;
			    const quality = parseFloat(qualityInput.value);
			    const fileName = `resized-image.${format.split('/')[1]}`;

			    canvas.toBlob((blob) => {
			        const url = URL.createObjectURL(blob);

			        const a = document.createElement('a');
			        a.href = url;
			        a.download = fileName;

			        document.body.appendChild(a);
			        a.click();
			        document.body.removeChild(a);

			        URL.revokeObjectURL(url); // Limpia la memoria
			    }, format, quality);
			}

			// --- Funciones del Modal ---
			function openModal() {
			    if (!currentImageSrc) return;

			    modalImage.src = currentImageSrc;
			    modal.style.display = 'block';

			    document.body.style.overflow = 'hidden'; // Evitar scroll de fondo

			    // Resetear zoom al abrir
			    modalImageScale = 1;
			    modalImage.style.transform = 'scale(1)';
			}

			function closeModal() {
			    modal.style.display = 'none';

			    document.body.style.overflow = 'auto'; // Restaurar scroll

			    // Resetear zoom al cerrar
			    modalImageScale = 1;
			    modalImage.style.transform = 'scale(1)';
			}

			});

			// --- MEZCLA DE IMÁGENES ---
			const bgInput = document.getElementById("bg-image-input");
			const fgInput = document.getElementById("fg-image-input");

			const mergeCanvas = document.getElementById("merge-canvas");
			const mergeCtx = mergeCanvas.getContext("2d");

			let bgImage = null;
			let fgImage = null;

			let fgX = 0;
			let fgY = 0;

			let isDragging = false;
			let offsetX = 0;
			let offsetY = 0;

			bgInput?.addEventListener("change", loadBg);
			fgInput?.addEventListener("change", loadFg);

			function loadBg(e) {

			    const file = e.target.files[0];
			    if (!file) return;

			    const img = new Image();

			    img.onload = () => {

			        bgImage = img;

			        mergeCanvas.width = img.width;
			        mergeCanvas.height = img.height;

			        drawMerge();
			    };

			    img.src = URL.createObjectURL(file);
			}

			function loadFg(e) {

			    const file = e.target.files[0];
			    if (!file) return;

			    const img = new Image();

			    img.onload = () => {

			        fgImage = img;

					fgX = (mergeCanvas.width - img.width) / 2;
					fgY = (mergeCanvas.height - img.height) / 2;

			        drawMerge();
			    };

			    img.src = URL.createObjectURL(file);
			}

			function drawMerge() {

			    if (!bgImage) return;

			    mergeCtx.clearRect(0, 0, mergeCanvas.width, mergeCanvas.height);

			    // fondo
			    mergeCtx.drawImage(bgImage, 0, 0);

			    // frontal
			    if (fgImage) {

			        mergeCtx.drawImage(
			            fgImage,
			            fgX,
			            fgY
			        );

			    }

			}

			function getMousePos(canvas, event) {

			    const rect = canvas.getBoundingClientRect();

			    const scaleX = canvas.width / rect.width;
			    const scaleY = canvas.height / rect.height;

			    return {
			        x: (event.clientX - rect.left) * scaleX,
			        y: (event.clientY - rect.top) * scaleY
			    };

			}

			mergeCanvas.addEventListener("mousedown", (e) => {

			    if (!fgImage) return;

			    const pos = getMousePos(mergeCanvas, e);

			    const mouseX = pos.x;
			    const mouseY = pos.y;

			    if (
			        mouseX >= fgX &&
			        mouseX <= fgX + fgImage.width &&
			        mouseY >= fgY &&
			        mouseY <= fgY + fgImage.height
			    ) {
			        isDragging = true;
			        offsetX = mouseX - fgX;
			        offsetY = mouseY - fgY;
			    }

			});

			mergeCanvas.addEventListener("mousemove", (e) => {

			    if (!isDragging) return;

			    const pos = getMousePos(mergeCanvas, e);

			    fgX = pos.x - offsetX;
			    fgY = pos.y - offsetY;

			    drawMerge();

			});

			mergeCanvas.addEventListener("mouseup", () => {
			    isDragging = false;
			});

			mergeCanvas.addEventListener("mouseleave", () => {
			    isDragging = false;
			});

			document.getElementById("download-merge")?.addEventListener("click", () => {

			    mergeCanvas.toBlob(blob => {

			        const url = URL.createObjectURL(blob);

			        const a = document.createElement("a");
			        a.href = url;
			        a.download = "merged-image.png";

			        document.body.appendChild(a);
			        a.click();
			        a.remove();
